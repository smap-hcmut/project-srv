# Traefik Middleware for stripping /project prefix
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: project-stripprefix
  namespace: smap
spec:
  stripPrefix:
    prefixes:
      - /project

---
# Traefik IngressRoute for project API (K3s uses IngressRoute for middleware support)
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: project-ingress
  namespace: smap
  labels:
    app.kubernetes.io/name: project
    app.kubernetes.io/part-of: smap
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`smap-api.tantai.dev`) && PathPrefix(`/project`)
      kind: Rule
      services:
        - name: project-api
          port: 80
      middlewares:
        - name: project-stripprefix

