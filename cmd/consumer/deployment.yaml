apiVersion: apps/v1
kind: Deployment
metadata:
  name: project-consumer
  namespace: smap
  labels:
    app: project-consumer
    service: project-srv
    version: v1
spec:
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: project-consumer
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: project-consumer
        service: project-srv
        version: v1
    spec:
      imagePullSecrets:
        - name: harbor-registry
      containers:
        - name: project-consumer
          image: registry.tantai.dev/smap/project-consumer:260315-010536
          imagePullPolicy: IfNotPresent
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "1000m"
          envFrom:
            - configMapRef:
                name: project-config
            - secretRef:
                name: project-secrets
          env:
            - name: CONTAINER_NAME
              value: "project-consumer"
            - name: KUBERNETES_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - ps aux | grep -v grep | grep -q consumer
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 3
      terminationGracePeriodSeconds: 30
