# SMAP Project Service Configuration

# Environment
environment:
  name: development # production | staging | development

# HTTP Server
http_server:
  port: 8080
  mode: debug # debug | release | test

# Logger
logger:
  level: debug
  mode: debug
  encoding: console # console | json
  color_enabled: true

# PostgreSQL
postgres:
  host: localhost
  port: 5432
  user: postgres
  password: postgres
  dbname: smap
  sslmode: disable
  schema: schema_project

# Redis
redis:
  host: localhost
  port: 6379
  password: "redis_password"
  db: 0

# Kafka
kafka:
  brokers:
    - localhost:9092
  topic: "project.events"
  group_id: "project-consumer"

# JWT
jwt:
  secret_key: "smap-secret-key-at-least-32-chars-long-for-security"

# Cookie
cookie:
  domain: ".localhost"
  secure: false
  samesite: "Lax"
  max_age: 28800
  max_age_remember: 604800
  name: "smap_auth_token"

# Encrypter
encrypter:
  key: "test-encryption-key-32-chars-123"

# Internal auth
internal:
  internal_key: "project-service-internal-key-change-in-production"

# Discord
discord:
  webhook_url: ""
