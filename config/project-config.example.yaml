# SMAP Project Service – Example configuration
# Copy to project-config.yaml and set secrets. Env vars override (e.g. POSTGRES_PASSWORD, JWT_SECRET_KEY).
# Paths: ./config, ./, /etc/smap/

# Environment
environment:
  name: development # production | staging | development

# HTTP Server
http_server:
  port: 8080
  mode: debug # debug | release | test

# Logger
logger:
  level: debug
  mode: debug
  encoding: console # console | json
  color_enabled: true

# PostgreSQL
postgres:
  host: localhost
  port: 5432
  user: postgres
  password: "postgres"
  dbname: postgres
  sslmode: prefer
  schema: project

# Redis
redis:
  host: localhost
  port: 6379
  password: ""
  db: 0

# Kafka
kafka:
  brokers:
    - "localhost:9092"
  topic: "project.events"
  group_id: "project-consumer"

# JWT
jwt:
  secret_key: "REPLACE-WITH-SHARED-SECRET-MIN-32-CHARS"

# Cookie
cookie:
  name: "smap_auth_token"
  max_age: 28800  # 8 hours
  domain: ".tantai.dev"  # Used for production; localhost origin gets SameSite=None dynamically
encrypter:
  key: "REPLACE-WITH-32-CHAR-ENCRYPTION-KEY"

# Internal auth
internal:
  internal_key: ""

# Discord
discord:
  webhook_url: ""
